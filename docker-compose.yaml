version: '3.8'

services:
  worker:
    build: ./worker
    expose:
      - "9000"
    environment:
      - BATCH_SIZE=5000

  manager:
    build: ./manager
    ports:
      - "8080:8080"
    environment:
      - BATCH_SIZE=5000
      - WORKER_COUNT=2

  nginx:
    image: nginx
    ports:
      - "9000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - worker